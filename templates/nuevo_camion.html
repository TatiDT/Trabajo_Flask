{% extends "base.html" %}
{% block titulo %}{% if editando %}Editar{% else %}Nuevo{% endif %} Camión{% endblock %}
{% block content %}
<div class="content-header">
    <h1>{% if editando %}Editar Camión{% else %}Agregar Camión{% endif %}</h1>
    <p class="subtitle">Complete los datos del vehículo</p>
</div>

<div class="form-container">
    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" class="camion-form" action="{% if editando %}{{ url_for('editar_camion', id=camion.id) }}{% else %}{{ url_for('nuevo_camion') }}{% endif %}">
        <div class="form-group">
            <label for="patente">Patente:</label>
            <input type="text" id="patente" name="patente" value="{{ camion.patente if camion else request.form.patente or '' }}" required>
        </div>
        <div class="form-group">
            <label for="modelo">Modelo:</label>
            <input type="text" id="modelo" name="modelo" value="{{ camion.modelo if camion else request.form.modelo or '' }}" required>
        </div>
        <div class="form-group">
            <label for="estado">Estado:</label>
            <select id="estado" name="estado" required>
                <option value="Disponible" {% if (camion and camion.estado == 'Disponible') or request.form.estado == 'Disponible' %}selected{% endif %}>Disponible</option>
                <option value="En ruta" {% if (camion and camion.estado == 'En ruta') or request.form.estado == 'En ruta' %}selected{% endif %}>En ruta</option>
                <option value="En mantenimiento" {% if (camion and camion.estado == 'En mantenimiento') or request.form.estado == 'En mantenimiento' %}selected{% endif %}>En mantenimiento</option>
            </select>
        </div>
        <div class="form-group">
            <label for="kilometraje">Kilometraje (km):</label>
            <input type="number" id="kilometraje" name="kilometraje" value="{{ camion.kilometraje if camion else request.form.kilometraje or '' }}" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-guardar">Guardar</button>
            <a href="{{ url_for('lista_camiones') }}" class="btn-cancelar">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
