<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Camión - Hirata</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Agregar Camión</h1>
        <p class="subtitle">Complete los datos del nuevo vehículo</p>

        
        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        
        <form method="POST" action="{{ url_for('nuevo_camion') }}">
            <div class="form-group">
                <label for="patente">Patente:</label>
                <input type="text" 
                       id="patente" 
                       name="patente" 
                       value="{{ request.form.patente or '' }}"
                       placeholder="Ej: ABC-123" 
                       required>
            </div>

            <div class="form-group">
                <label for="modelo">Modelo:</label>
                <input type="text" 
                       id="modelo" 
                       name="modelo" 
                       value="{{ request.form.modelo or '' }}"
                       placeholder="Ej: Volvo FH16" 
                       required>
            </div>

            <div class="form-group">
                <label for="estado">Estado:</label>
                <select id="estado" name="estado" required>
                    <option value="" {% if not request.form.estado %}selected{% endif %}>Seleccione un estado</option>
                    <option value="Disponible" {% if request.form.estado == 'Disponible' %}selected{% endif %}>Disponible</option>
                    <option value="En ruta" {% if request.form.estado == 'En ruta' %}selected{% endif %}>En ruta</option>
                    <option value="En mantenimiento" {% if request.form.estado == 'En mantenimiento' %}selected{% endif %}>En mantenimiento</option>
                </select>
            </div>

            <div class="form-group">
                <label for="kilometraje">Kilometraje (km):</label>
                <input type="number" 
                       id="kilometraje" 
                       name="kilometraje" 
                       value="{{ request.form.kilometraje or '' }}"
                       placeholder="Ej: 150000" 
                       min="0"
                       required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-guardar">Guardar Camión</button>
                <a href="{{ url_for('lista_camiones') }}" class="btn-cancelar">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
