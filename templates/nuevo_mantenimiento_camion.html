<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Mantenimiento - Hirata</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Hirata</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="{{ url_for('lista_camiones') }}">
                            <i class="fas fa-truck icon"></i>
                            <span class="text">Camiones</span>
                        </a>
                    </li>
                    <li class="active">
                        <a href="{{ url_for('mantenimiento') }}">
                            <i class="fas fa-wrench icon"></i>
                            <span class="text">Mantenimientos</span>
                        </a>
                    </li>
                    <li>
                        <a href="{{ url_for('lista_equipos') }}">
                            <i class="fas fa-laptop icon"></i>
                            <span class="text">Equipos Informáticos</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <i class="fas fa-microchip icon"></i>
                            <span class="text">Sensores (Prototipo)</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <span>Transportes Hirata 2026</span>
            </div>
        </aside>

        <main class="main-content">
            <h1>Agregar Mantenimiento a Camión</h1>

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" class="form-container">
                <div class="form-group">
                    <label for="referencia_id">Selecciona el camión:</label>
                    <select name="referencia_id" id="referencia_id">
                        <option value="">-- Seleccione --</option>
                        {% for c in elementos or camiones %}
                        <option value="{{ c.id }}" {% if (request.form.get('referencia_id')|int==c.id) or (mantenimiento
                            and mantenimiento.referencia_id==c.id) %} selected {% endif %}>
                            {{ c.patente }} - {{ c.modelo }}
                        </option>
                        {% endfor %}
                    </select>

                </div>

                <div class="form-group">
                    <label for="fecha_inicio">Fecha de inicio:</label>
                    <input type="date" name="fecha_inicio" value="{{ request.form.fecha_inicio or '' }}" required>
                </div>

                <div class="form-group">
                    <label for="fecha_fin">Fecha de fin (opcional):</label>
                    <input type="date" name="fecha_fin" value="{{ request.form.fecha_fin or '' }}">
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción:</label>
                    <textarea name="descripcion" rows="4" required>{{ request.form.descripcion or '' }}</textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-guardar">Guardar</button>
                    <a href="{{ url_for('mantenimiento') }}" class="btn-cancelar">Cancelar</a>
                </div>
            </form>
        </main>
    </div>
</body>

</html>
