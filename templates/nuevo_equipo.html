<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Equipo - Hirata</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Hirata</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="{{ url_for('lista_camiones') }}">
                            <i class="fas fa-truck icon"></i>
                            <span class="text">Camiones</span>
                        </a>
                    </li>
                    <li>
                        <a href="{{ url_for('mantenimiento') }}">
                            <i class="fas fa-wrench icon"></i>
                            <span class="text">Mantenimiento</span>
                        </a>
                    </li>
                    <li class="active">
                        <a href="{{ url_for('lista_equipos') }}">
                            <i class="fas fa-laptop icon"></i>
                            <span class="text">Equipos Informáticos</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <i class="fas fa-microchip icon"></i>
                            <span class="text">Sensores (Prototipo)</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <span>Transportes Hirata 2026</span>
            </div>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h1>Agregar Equipo Informático</h1>
                <p class="subtitle">Complete los datos del nuevo equipo</p>
            </div>

            <div class="form-container">
                {% if error %}
                    <div class="alert alert-error">{{ error }}</div>
                {% endif %}

                <form method="POST" action="{{ url_for('nuevo_equipo') }}" class="camion-form">
                    <div class="form-group">
                        <label for="tipo">Tipo:</label>
                        <input type="text" 
                               id="tipo" 
                               name="tipo" 
                               value="{{ request.form.tipo or '' }}"
                               placeholder="Ej: Celular, Computador"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="modelo">Modelo:</label>
                        <input type="text" 
                               id="modelo" 
                               name="modelo" 
                               value="{{ request.form.modelo or '' }}"
                               placeholder="Ej: Samsung A52, HP EliteBook"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="origen">Origen:</label>
                        <select id="origen" name="origen" required>
                            <option value="" {% if not request.form.origen %}selected{% endif %}>Seleccione origen</option>
                            <option value="oficina" {% if request.form.origen == 'oficina' %}selected{% endif %}>Oficina</option>
                            <option value="flota" {% if request.form.origen == 'flota' %}selected{% endif %}>Flota (Camiones)</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-guardar">Guardar Equipo</button>
                        <a href="{{ url_for('lista_equipos') }}" class="btn-cancelar">Cancelar</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
